<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meisophant Search</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f4f0ff;
            color: #333;
        }

        header {
            background-color: mediumpurple;
            padding: 30px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        /* Search Box */
        #meisophant-search input.gsc-input {
            border-radius: 12px;
            padding: 14px;
            width: 350px;
            border: 2px solid mediumpurple;
            font-size: 16px;
        }

        #meisophant-search input.gsc-search-button {
            background-color: mediumpurple;
            color: white;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }

        #meisophant-search input.gsc-search-button:hover {
            background-color: rebeccapurple;
        }

        /* Results Cards */
        #meisophant-results .gsc-webResult {
            background-color: #fff;
            border: 2px solid mediumpurple;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #meisophant-results .gsc-webResult:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
        }

        #meisophant-results .gs-title a {
            color: mediumpurple;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1rem;
        }

        #meisophant-results .gs-title a:hover {
            text-decoration: underline;
        }

        #meisophant-results .gs-snippet {
            color: #4b0082;
            font-size: 14px;
            margin-top: 6px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #meisophant-search input.gsc-input {
                width: 100%;
            }
            #meisophant-search input.gsc-search-button {
                width: 100%;
                margin-top: 8px;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Meisophant Search</h1>
    </header>

    <main>
        <!-- Search Box -->
        <div class="gcse-searchbox-only" id="meisophant-search"></div>

        <!-- Search Results -->
        <div class="gcse-searchresults-only" id="meisophant-results"></div>
    </main>

    <!-- Google Programmable Search Engine Script -->
    <script async src="https://cse.google.com/cse.js?cx=d4f0479b5876e4b0c"></script>
</body>
</html>
