<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meisophant Search</title>

<!-- Google Programmable Search -->
<script async src="https://cse.google.com/cse.js?cx=e50129a56b7cb4a17"></script>

<style>

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1a102b, #0a0614);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 700px;
}

.logo {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.tagline {
    font-size: 16px;
    color: #94a3b8;
    margin-bottom: 30px;
}

/* Search box styling */
.gsc-control-cse {
    background: transparent !important;
    border: none !important;
}

input.gsc-input {
    padding: 14px !important;
    border-radius: 14px !important;
    border: 2px solid mediumpurple !important;
    font-size: 16px !important;
}

button.gsc-search-button {
    background: mediumpurple !important;
    border-radius: 12px !important;
    padding: 12px 18px !important;
}

/* Footer */
.footer {
    margin-top: 40px;
    font-size: 14px;
    color: #64748b;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Meisophant</div>
<div class="tagline">Search the web smarter</div>

<div class="gcse-search"></div>

<div class="footer">
    © 2026 Meisophant
</div>

</div>

</body>
</html>
